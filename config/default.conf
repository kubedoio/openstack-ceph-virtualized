###############################################################################
# config/default.conf - Common Configuration
#
# This file contains settings that are common to ALL hypervisors.
# It will be loaded first, then hypervisor-specific configs will override
# these values as needed.
#
# Usage:
#   source config/default.conf
#   # Then source hypervisor-specific config
###############################################################################

# ---------- Network Configuration ----------
# Network settings for the VM cluster
GATEWAY="10.1.199.254"
BASE_IP="10.1.199"              # First three octets
START_IP_SUFFIX=140             # os0 will be .140 (10.1.199.140)

# Network interfaces (inside VMs)
NETWORK_INTERFACE="eth0"        # Internal management interface
EXTERNAL_INTERFACE="ens19"      # External provider interface

# ---------- VM Configuration ----------
# Virtual machine settings
VM_PREFIX="os"                  # Prefix for VM names (os0, os1, os2, ...)
NODE_COUNT=6                    # Total nodes: os1 through os<NODE_COUNT>
OS0_ID=4140                     # VM ID for jump host (os0)

# VM resource allocation
DEFAULT_CORES=4                 # Default CPU cores per VM
DEFAULT_MEMORY_MB=8192          # Default RAM per VM (8GB)

# Extra RAM for OpenStack nodes
OPENSTACK_NODE_INDEXES=(5 6)   # Which nodes get extra memory (os5, os6)
OPENSTACK_MEMORY_MB=32768       # RAM for OpenStack nodes (32GB)

# Disk configuration
SYSTEM_DISK_SIZE_GB=50          # System disk size
OSD_DISK_SIZE_GB=100            # Ceph OSD disk size
OSD_DISKS_PER_VM=2              # Number of OSD disks per VM

# ---------- Kubernetes Configuration ----------
# Kubespray and Kubernetes settings
KUBESPRAY_DIR="kubespray"
INVENTORY_NAME="rook-ceph-k8s"
KUBERNETES_VERSION="v1.28.0"    # Kubernetes version to deploy

# ---------- Rook-Ceph Configuration ----------
# Rook-Ceph storage cluster settings
ROOK_VERSION="v1.13.0"          # Rook operator version
CEPH_VERSION="v18.2.0"          # Ceph version (Reef)

# Ceph pools used by OpenStack
CEPH_POOLS=(volumes images backups vms)

# ---------- OpenStack Configuration ----------
# Kolla-Ansible and OpenStack settings
KOLLA_DIR="kolla"
OPENSTACK_INVENTORY_FILE="multinode"
OPENSTACK_RELEASE="2024.1"      # OpenStack release (Caracal)

# OpenStack node list (name:IP)
# Add or remove entries as needed
OPENSTACK_NODE_LIST=(
  "os5:10.1.199.145"
  "os6:10.1.199.146"
)

# Kolla globals.yml settings
KOLLA_INTERNAL_VIP_ADDRESS="10.1.199.150"
KOLLA_EXTERNAL_VIP_INTERFACE="ens19"
NEUTRON_EXTERNAL_INTERFACE="ens19"
NEUTRON_PLUGIN_AGENT="openvswitch"
ENABLE_NEUTRON_DVR="yes"

# ---------- SSH Configuration ----------
# SSH public key file for VM access
PUB_KEY_FILE="pub_keys"

# ---------- Hypervisor Configuration ----------
# This will be overridden by hypervisor-specific configs
# Valid values: auto, proxmox, cloudhypervisor, proxmox-cloudhypervisor
HYPERVISOR="auto"
