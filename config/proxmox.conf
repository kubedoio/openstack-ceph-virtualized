###############################################################################
# config/examples/proxmox.conf - Proxmox VE Configuration
#
# Use this configuration when deploying on Proxmox VE hypervisor.
#
# Usage:
#   1. Copy to config/proxmox.conf:
#      cp config/examples/proxmox.conf config/proxmox.conf
#
#   2. Edit config/proxmox.conf with your settings
#
#   3. Set HYPERVISOR in config/default.conf or export:
#      export HYPERVISOR=proxmox
#
# This file will be loaded AFTER config/default.conf, so you only need
# to specify Proxmox-specific overrides.
###############################################################################

# ---------- Hypervisor Selection ----------
HYPERVISOR="proxmox"

# ---------- Proxmox-Specific Settings ----------

# Template VM ID (Ubuntu cloud-init template created by cloud-init-template.sh)
TEMPLATE_ID=4444

# Network bridges (Proxmox bridges must exist)
BRIDGE_INTERNAL="vmbr1199"      # Internal management network
BRIDGE_EXTERNAL="vmbr2199"      # External provider network

# Storage configuration
STORAGE_POOL="local-lvm"        # Proxmox storage pool for VM disks

# VM ID range (optional - for organizing VMs)
# VM_ID_START=4140              # Start VM IDs from this number

# ---------- Proxmox Node Configuration ----------
# If running on Proxmox cluster, specify target node
# PROXMOX_NODE="pve"            # Target node name (optional)

# ---------- Advanced Settings ----------
# CPU type for VMs (affects live migration compatibility)
# CPU_TYPE="host"               # Use host CPU (better performance)
# CPU_TYPE="kvm64"              # Generic CPU (better compatibility)

# BIOS type
# BIOS_TYPE="ovmf"              # UEFI (modern)
# BIOS_TYPE="seabios"           # Legacy BIOS (default)

# ---------- Network Settings ----------
# Network model (virtio is fastest)
NET_MODEL="virtio"

# VLAN tagging (if using VLANs)
# VLAN_INTERNAL=1199
# VLAN_EXTERNAL=2199
