###############################################################################
# config/examples/hybrid.conf - Hybrid Mode Configuration
#
# Use this configuration when running Cloud Hypervisor VMs on Proxmox VE
# infrastructure. This mode allows you to use Cloud Hypervisor's lightweight
# virtualization while leveraging Proxmox's network bridges.
#
# Usage:
#   1. Copy to config/hybrid.conf:
#      cp config/examples/hybrid.conf config/hybrid.conf
#
#   2. Edit config/hybrid.conf with your settings
#
#   3. Set HYPERVISOR in config/default.conf or export:
#      export HYPERVISOR=proxmox-cloudhypervisor
#
#   4. Run setup script:
#      sudo ./setup-hybrid-mode.sh
#
# This file will be loaded AFTER config/default.conf, so you only need
# to specify hybrid mode-specific overrides.
###############################################################################

# ---------- Hypervisor Selection ----------
HYPERVISOR="proxmox-cloudhypervisor"

# ---------- Hybrid Mode Settings ----------

# Use Proxmox bridges (yes = use vmbr*, no = create chbr*)
HYBRID_USE_PROXMOX_BRIDGES="yes"

# Proxmox bridge names (must exist in Proxmox)
HYBRID_BRIDGE_INTERNAL="vmbr1199"   # Internal management network
HYBRID_BRIDGE_EXTERNAL="vmbr2199"   # External provider network

# VM ID allocation (avoid conflicts with Proxmox VMs)
# Proxmox VMs: 100-4999
# Cloud Hypervisor VMs: 5000+
HYBRID_VM_ID_START=5000

# TAP device naming prefix (avoid conflicts with Proxmox)
# Proxmox TAP devices: tap<vmid>i<n>
# Cloud Hypervisor TAP devices: tap-ch-<vmid>-<n>
HYBRID_TAP_PREFIX="tap-ch"

# ---------- Cloud Hypervisor Directories ----------

# VM storage directory
CH_VM_DIR="/var/lib/cloud-hypervisor/vms"

# Image storage directory (templates, cloud images)
CH_IMAGE_DIR="/var/lib/cloud-hypervisor/images"

# API socket directory
CH_API_SOCKET="/run/cloud-hypervisor"

# ---------- Cloud Hypervisor Settings ----------

# Use Cloud Hypervisor REST API (recommended)
CH_USE_API="yes"

# Cloud Hypervisor binary path (if not in $PATH)
# CH_BINARY="/usr/local/bin/cloud-hypervisor"

# ---------- Template Configuration ----------

# Ubuntu cloud image template
TEMPLATE_IMAGE_NAME="ubuntu-24.04-cloudimg-template.raw"
TEMPLATE_IMAGE_PATH="${CH_IMAGE_DIR}/${TEMPLATE_IMAGE_NAME}"

# Proxmox template ID (if you also have Proxmox VMs)
# TEMPLATE_ID=4444

# Download URL (used by setup script)
UBUNTU_VERSION="24.04"
UBUNTU_IMAGE_URL="https://cloud-images.ubuntu.com/releases/${UBUNTU_VERSION}/release/ubuntu-${UBUNTU_VERSION}-server-cloudimg-amd64.img"

# ---------- Network Configuration ----------

# Bridge IP addresses (typically managed by Proxmox)
# Only needed if Proxmox bridges don't have IPs configured
# BRIDGE_INTERNAL_IP="10.1.199.254/24"
# BRIDGE_EXTERNAL_IP="10.2.199.254/24"

# Network model
NET_MODEL="virtio"

# ---------- VM Resource Allocation ----------

# Override default resources for Cloud Hypervisor VMs
# (Proxmox VMs typically use more resources)
# DEFAULT_CORES=4
# DEFAULT_MEMORY_MB=8192

# Cloud Hypervisor VMs can use less memory due to lower overhead
# CH_MEMORY_REDUCTION_MB=1024   # Reduce by 1GB compared to Proxmox VMs

# ---------- Coexistence Settings ----------

# Separate logs for Cloud Hypervisor VMs
CH_LOG_DIR="/var/log/cloud-hypervisor"

# PID file for tracking Cloud Hypervisor VMs
CH_PID_FILE="/var/run/cloud-hypervisor-vms.pids"

# ---------- Advanced Settings ----------

# CPU affinity (pin Cloud Hypervisor VMs to specific CPUs)
# Useful for ensuring Proxmox VMs and CH VMs don't compete
# CH_CPU_AFFINITY="4-7"         # Use CPUs 4-7 for CH VMs

# Memory settings
# CH_MEMORY_SHARED="no"
# CH_MEMORY_HUGEPAGES="no"

# Disk settings
# CH_DISK_DIRECT="yes"
# CH_DISK_NUM_QUEUES=1

# Network settings
# CH_NET_NUM_QUEUES=2
