###############################################################################
# config/examples/cloudhypervisor.conf - Cloud Hypervisor Configuration
#
# Use this configuration when deploying on bare metal Linux with Cloud
# Hypervisor as the hypervisor.
#
# Usage:
#   1. Copy to config/cloudhypervisor.conf:
#      cp config/examples/cloudhypervisor.conf config/cloudhypervisor.conf
#
#   2. Edit config/cloudhypervisor.conf with your settings
#
#   3. Set HYPERVISOR in config/default.conf or export:
#      export HYPERVISOR=cloudhypervisor
#
#   4. Run setup script:
#      sudo ./setup-cloud-hypervisor.sh
#
# This file will be loaded AFTER config/default.conf, so you only need
# to specify Cloud Hypervisor-specific overrides.
###############################################################################

# ---------- Hypervisor Selection ----------
HYPERVISOR="cloudhypervisor"

# ---------- Cloud Hypervisor Directories ----------

# VM storage directory
CH_VM_DIR="/var/lib/cloud-hypervisor/vms"

# Image storage directory (templates, cloud images)
CH_IMAGE_DIR="/var/lib/cloud-hypervisor/images"

# API socket directory
CH_API_SOCKET="/run/cloud-hypervisor"

# ---------- Cloud Hypervisor Settings ----------

# Use Cloud Hypervisor REST API (recommended)
CH_USE_API="yes"

# Cloud Hypervisor binary path (if not in $PATH)
# CH_BINARY="/usr/local/bin/cloud-hypervisor"

# ---------- Network Configuration ----------

# Linux bridges (created by setup-cloud-hypervisor.sh)
BRIDGE_INTERNAL="chbr1199"      # Internal management network
BRIDGE_EXTERNAL="chbr2199"      # External provider network

# Bridge IP addresses (gateway for VMs)
BRIDGE_INTERNAL_IP="10.1.199.254/24"
BRIDGE_EXTERNAL_IP="10.2.199.254/24"

# Enable NAT for external bridge (VMs can access internet)
ENABLE_NAT="yes"

# External interface for NAT (auto-detect if not specified)
# EXTERNAL_INTERFACE="eth0"

# ---------- Template Configuration ----------

# Ubuntu cloud image template
TEMPLATE_IMAGE_NAME="ubuntu-24.04-cloudimg-template.raw"
TEMPLATE_IMAGE_PATH="${CH_IMAGE_DIR}/${TEMPLATE_IMAGE_NAME}"

# Download URL (used by setup script)
UBUNTU_VERSION="24.04"
UBUNTU_IMAGE_URL="https://cloud-images.ubuntu.com/releases/${UBUNTU_VERSION}/release/ubuntu-${UBUNTU_VERSION}-server-cloudimg-amd64.img"

# ---------- VM Configuration ----------

# Disk format (Cloud Hypervisor only supports raw)
DISK_FORMAT="raw"

# Enable virtio-mem (dynamic memory resizing)
# CH_ENABLE_VIRTIO_MEM="yes"

# Serial console logging
# CH_SERIAL_LOG="yes"
# CH_SERIAL_LOG_DIR="${CH_VM_DIR}/logs"

# ---------- Advanced Settings ----------

# Number of vCPUs per VM (overrides DEFAULT_CORES)
# CH_VCPUS=4

# CPU topology (threads per core, cores per die, dies per package)
# CH_CPU_TOPOLOGY="1,4,1"

# Memory settings
# CH_MEMORY_SHARED="no"         # Use shared memory
# CH_MEMORY_HUGEPAGES="no"      # Use hugepages

# Disk settings
# CH_DISK_DIRECT="yes"          # Use O_DIRECT for disk I/O
# CH_DISK_NUM_QUEUES=1          # Number of virtio-blk queues

# Network settings
# CH_NET_NUM_QUEUES=2           # Number of virtio-net queues
