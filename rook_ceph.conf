###############################################################################
#  rook_ceph.conf – Legacy Configuration File
#
#  ⚠️  NOTICE: This configuration format is being phased out
#
#  New modular configuration structure available in config/ directory:
#    - config/default.conf (common settings)
#    - config/proxmox.conf (Proxmox-specific)
#    - config/cloudhypervisor.conf (Cloud Hypervisor-specific)
#    - config/hybrid.conf (Hybrid mode-specific)
#
#  Benefits of new structure:
#    - Clearer organization
#    - Only edit relevant hypervisor settings
#    - Example configs in config/examples/
#    - Better documentation in config/README.md
#
#  Migration:
#    1. Copy example config: cp config/examples/proxmox.conf config/proxmox.conf
#    2. Review and adjust: vi config/default.conf config/proxmox.conf
#    3. Test: export HYPERVISOR=proxmox && ./scripts/utils/validate-config.sh
#
#  This file will continue to work for backward compatibility but is
#  no longer the recommended approach.
###############################################################################

# ---------- network ----------
GATEWAY="10.1.199.254"
BASE_IP="10.1.199"          # first three octets
START_IP_SUFFIX=140         # os0 will be .140

# ---------- hypervisor ----------
HYPERVISOR="auto"                    # auto, proxmox, cloudhypervisor, proxmox-cloudhypervisor
CH_VM_DIR="/var/lib/cloud-hypervisor/vms"
CH_IMAGE_DIR="/var/lib/cloud-hypervisor/images"
CH_API_SOCKET="/run/cloud-hypervisor/api.sock"
CH_USE_API="yes"

# Hybrid mode (proxmox-cloudhypervisor) specific settings
HYBRID_USE_PROXMOX_BRIDGES="yes"     # Use Proxmox vmbr* bridges
HYBRID_BRIDGE_INTERNAL="vmbr1199"    # Proxmox internal bridge
HYBRID_BRIDGE_EXTERNAL="vmbr2199"    # Proxmox external bridge
HYBRID_VM_ID_START=5000              # Start Cloud Hypervisor VM IDs at 5000 to avoid conflicts

# ---------- proxmox / VM ----------
TEMPLATE_ID=4444            # ID of your cloud-init template
OS0_ID=4140                 # VM-ID you want for os0 (jump host)
NODE_COUNT=6                # os1 … os<NODE_COUNT>
VM_PREFIX="os"

# Extra RAM for the two OpenStack VMs (index inside the cluster, *not* the VM-ID)
OPENSTACK_NODE_INDEXES=(5 6)
OPENSTACK_MEMORY_MB=32768

# ---------- Kubernetes / Rook ----------
KUBESPRAY_DIR="kubespray"
INVENTORY_NAME="rook-ceph-k8s"

# ---------- OpenStack / Kolla ----------
KOLLA_DIR="kolla"
OPENSTACK_INVENTORY_FILE="multinode"

# All controller/compute/storage nodes (name:IP).
# ***Add or remove entries here only***
OPENSTACK_NODE_LIST=(
  "os5:10.1.199.145"
  "os6:10.1.199.146"
)

# Kolla globals.yml tunables
# BRIDGE vmbr1199 -> eth0
# BRIDGE vmbr2199 -> ens19
KOLLA_INTERNAL_VIP_ADDRESS="10.1.199.150"
KOLLA_EXTERNAL_VIP_INTERFACE="ens19"
NETWORK_INTERFACE="eth0"
NEUTRON_EXTERNAL_INTERFACE="ens19"
NEUTRON_PLUGIN_AGENT="openvswitch"
ENABLE_NEUTRON_DVR="yes"

# ---------- Ceph pools used by OpenStack ----------
CEPH_POOLS=(volumes images backups vms)

# ---------- misc ----------
PUB_KEY_FILE="pub_keys"